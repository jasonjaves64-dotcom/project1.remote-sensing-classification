version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - MODEL_VERSION=v5
      - EDL_ENABLED=true
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./data:/app/data
      - ./output:/app/output
    restart: unless-stopped

  streamlit:
    build: .
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/app
      - MODEL_VERSION=v5
      - EDL_ENABLED=true
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./data:/app/data
      - ./output:/app/output
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: crop_classification
      MYSQL_USER: admin
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped

volumes:
  mysql_data: